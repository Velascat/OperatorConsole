name: FOB
repo_root: /home/dev/Documents/GitHub/FOB
status_repos: ""  # show all ControlPlane-tracked repos

# TODO: migrate to aider once SwitchBoard integration is validated end-to-end.
# To switch: add `tool: aider` and an `aider: {profile: capable}` block here,
# matching the pattern in switchboard.yaml.  The `claude:` block below can be
# removed at that point.
claude:
  continue: true
  bootstrap_files:
    - .fob/standing-orders.md
    - .fob/active-mission.md
    - .fob/objectives.md
    - .fob/mission-log.md
  peers: []

panes:
  git:
    command: lazygit
  logs:
    command: tail -f .fob/runtime.log 2>/dev/null
  shell:
    command: bash

helpers:
  test: python3 -m pytest tests/ -x -v
  audit: ruff check src/
