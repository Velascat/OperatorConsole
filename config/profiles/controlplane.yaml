name: OperationsCenter
repo_root: /home/dev/Documents/GitHub/OperationsCenter

claude:
  continue: true
  bootstrap_files:
    - .console/directives.md
    - .console/active-task.md
    - .console/objectives.md
    - .console/mission-log.md
  peers: []

panes:
  git:
    command: lazygit
  logs:
    command: tail -f logs/local/watch-all/goal.status.json 2>/dev/null || echo 'No status yet'
  shell:
    command: bash

helpers:
  test: .venv/bin/pytest -q
  audit: .venv/bin/ruff check .
  status: bash scripts/operations-center.sh watch-all-status
  dev-up: bash scripts/operations-center.sh dev-up
  dev-down: bash scripts/operations-center.sh dev-down
