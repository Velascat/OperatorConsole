repo_key: OperatorConsole
src_root: src
tests_root: tests

# Minimum baseline — runs Custodian's generic C1-C8 only.
# Add `plugins:` and `detectors:` here when this repo grows its own
# `_custodian/` overlay layer (see OperationsCenter for a worked example).

audit:
  # C2: OperatorConsole is a CLI/TUI tool — print() is its user-facing output API,
  # not a debug leftover. Exempting the whole package is the honest config.
  # C1: bootstrap.py has a single deferred TODO (pending SwitchBoard validation).
  # C4: watcher_status_pane, launcher, observer, queue — these do resource
  #     polling, subprocess probing, and file reads for TUI display; a single
  #     failure must not crash the UI loop; pass is intentionally silent.
  # C13: OperatorConsole is a TUI/CLI tool that reads env vars for tool paths,
  #      profile config, and terminal capabilities. There is no separate config
  #      layer — env access is the config layer.
  c13_allowed_paths:
    - "src/operator_console/**/*.py"

  exclude_paths:
    C2:
      - "src/operator_console/**/*.py"
    C1:
      - src/operator_console/bootstrap.py
    C4:
      - src/operator_console/watcher_status_pane.py
      - src/operator_console/launcher.py
      - src/operator_console/observer.py
      - src/operator_console/queue.py
      - src/operator_console/commands.py
      - src/operator_console/delegate.py
      - src/operator_console/providers.py
      - src/operator_console/bootstrap.py
      - src/operator_console/clean.py
      - src/operator_console/cli.py
      - src/operator_console/runs_cmd.py
    C11:
      # OperatorConsole is a TUI that spawns Claude/kodo sessions (no timeout
      # appropriate) and runs user-triggered commands (user controls duration).
      # Exceptions from all subprocess calls are already caught by the TUI
      # resilience handlers (see C9 exclusion rationale).
      - "src/operator_console/**/*.py"
    C10:
      # These files use datetime.now() to format a local-time display string
      # ("saved_at": "2026-04-30 14:22") shown in the TUI. Local time is correct
      # for UI labels; UTC would confuse users of a local desktop tool.
      - src/operator_console/bootstrap.py
      - src/operator_console/session_group.py
      - src/operator_console/layout.py
    C9:
      # OperatorConsole is a TUI application with no logging infrastructure.
      # Broad exception catches throughout the codebase are intentional resilience
      # patterns: a failing status poll, subprocess probe, or display render must
      # not crash the terminal UI. Exceptions are silently swallowed by design.
      - "src/operator_console/**/*.py"
    C29:
      # TUI command-dispatch and panel modules are large by design.
      # cli.py: full CLI argument dispatch + subcommand table.
      # commands.py: all interactive TUI commands + run management.
      # watcher_status_pane.py: full status pane with multiple sub-panels.
      - src/operator_console/cli.py
      - src/operator_console/commands.py
      - src/operator_console/watcher_status_pane.py
    D7:
      # cmd_* dispatch functions all accept `args: list[str]` for interface
      # consistency — not all currently parse args but the signature is fixed
      # by the CLI dispatcher calling convention.
      # bootstrap helpers (get_codex_command, ensure_claude_md) carry params
      # for API extensibility; callers currently pass only required args.
      - src/operator_console/commands.py
      - src/operator_console/bootstrap.py
    T1:
      # OperatorConsole is a TUI application — bootstrap, command dispatch,
      # and display modules are validated through integration use, not unit tests.
      - "src/operator_console/**/*.py"

  # K1 suppressions: config key names in architecture docs that are not Python
  # def/class names but appear in implementation context ("has `status_repos`").
  common_words:
    - status_repos

tools:
  ruff: true
  vulture: true
  # mypy/ty: enable when type annotations are stable
